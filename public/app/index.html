<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#EFE6F6" />
<meta name="google" content="notranslate" />
<title>Butler — MVP preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23160F22'/><g fill='white'><polygon points='6.2,11 6,11.6 6,20.4 6.2,21 15,16'/><polygon points='25.8,11 26,11.6 26,20.4 25.8,21 17,16'/><polygon points='16,14.3 17.1,16 16,17.7 14.9,16'/></g></svg>">
<style>
  :root {
    --lavender: #EFE6F6;
    --lavender-2: #E2D3EF;
    --lavender-3: #D1BCE4;
    --lavender-line: #9A86B8;
    --ink: #160F22;
    --ink-soft: #2A1F3D;
    --ink-muted: #5A4E6E;
    --cream: #F5E9C8;
    --mint: #CFE5D3;
    --sun: #F5C842;
    --blush: #F2C4C4;
    --white: #ffffff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(140deg, #F7F2FB 0%, var(--lavender) 35%, var(--lavender-2) 100%);
    min-height: 100svh;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }
  /* paper grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
    opacity: 0.07;
    mix-blend-mode: multiply;
    z-index: 999;
  }

  /* floating background squiggles on desktop */
  .bg-squiggle {
    position: fixed;
    pointer-events: none;
    opacity: 0.5;
    z-index: 0;
  }
  .bg-squiggle.one { top: 8%; left: 4%; }
  .bg-squiggle.two { bottom: 10%; right: 6%; }
  .bg-squiggle.three { top: 40%; right: 10%; }

  /* Phone shell */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 2;
  }
  .stage-label {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--ink-muted);
    font-size: 18px;
  }
  .stage-label b {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-style: normal;
    color: var(--ink);
  }
  .phone {
    width: 390px;
    max-width: calc(100vw - 48px);
    height: 844px;
    max-height: calc(100svh - 100px);
    background: var(--white);
    border: 10px solid var(--ink);
    border-radius: 48px;
    box-shadow:
      0 40px 80px -30px rgba(22,15,34,0.35),
      0 10px 30px -10px rgba(22,15,34,0.2);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .notch {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: var(--ink);
    border-radius: 20px;
    z-index: 5;
  }

  .statusbar {
    padding: 18px 28px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }
  .statusbar .icons {
    display: flex; gap: 5px; align-items: center;
  }

  /* Screen viewport */
  .screens {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    padding: 14px 24px 110px;
    overflow-y: auto;
    opacity: 0;
    transform: translate3d(16px, 0, 0);
    transition: opacity 220ms ease-out, transform 240ms cubic-bezier(.22,1,.36,1);
    pointer-events: none;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    will-change: transform, opacity;
    visibility: hidden;
    contain: layout paint;
  }
  .screen::-webkit-scrollbar { display: none; }
  .screen.active {
    opacity: 1;
    transform: translate3d(0, 0, 0);
    pointer-events: auto;
    visibility: visible;
  }
  .screen.leaving {
    transform: translate3d(-16px, 0, 0);
    visibility: visible;
  }

  /* Home greeting */
  .greeting-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .greeting-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -0.03em;
    font-size: 34px;
    line-height: 1.02;
    margin: 6px 0 4px;
  }
  .greeting-title i {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
  }
  .greeting-sub {
    font-size: 14px;
    color: var(--ink-muted);
  }

  /* Reminder card */
  .reminders {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .reminder {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 22px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(.22,1,.36,1);
    position: relative;
  }
  .reminder:active { transform: scale(0.98); }
  .reminder.mint { background: var(--mint); }
  .reminder.cream { background: var(--cream); }
  .reminder.blush { background: var(--blush); }
  .reminder.lav { background: var(--lavender-2); }
  .reminder.done { opacity: 0.5; }
  .reminder.done .r-title { text-decoration: line-through; }
  .time-chip {
    width: 52px; height: 52px;
    background: var(--white);
    border-radius: 14px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--ink);
    text-align: center;
    line-height: 1.1;
  }
  .time-chip small { font-size: 9px; color: var(--ink-muted); font-weight: 500; }
  .r-body { flex: 1; min-width: 0; }
  .r-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    line-height: 1.2;
    color: var(--ink);
  }
  .r-sub {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }
  .r-arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--sun);
    display: grid; place-items: center;
    font-size: 14px;
    flex: 0 0 auto;
  }

  /* Big black hero card */
  .hero-card {
    background: var(--ink);
    color: var(--cream);
    border-radius: 28px;
    padding: 20px 22px;
    margin-top: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero-card .h-eye {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,233,200,0.6);
  }
  .hero-card h3 {
    margin: 6px 0 0;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }
  .hero-card i {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
  }
  .hero-card .sparkle {
    position: absolute; right: 16px; top: 16px;
    color: var(--sun);
    font-size: 22px;
  }

  /* Tab bar */
  .tabbar {
    position: absolute;
    bottom: 18px; left: 18px; right: 18px;
    background: var(--ink);
    border-radius: 999px;
    padding: 10px 10px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 6;
    box-shadow: 0 20px 40px -20px rgba(22,15,34,0.5);
  }
  .tab {
    background: transparent;
    border: 0;
    color: rgba(245,233,200,0.6);
    padding: 10px 14px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
  }
  .tab svg { width: 16px; height: 16px; }
  .tab.active {
    background: var(--sun);
    color: var(--ink);
  }
  .tab:not(.active):active { background: rgba(255,255,255,0.08); }

  /* Header row */
  .head-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .avatar {
    width: 40px; height: 40px;
    background: url('butler-mark.png') center/cover no-repeat;
    border-radius: 50%;
    font-size: 0;
    color: transparent;
    cursor: pointer;
  }
  .bell {
    width: 40px; height: 40px;
    background: var(--lavender-2);
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 18px;
    position: relative;
  }
  .bell::after {
    content: ''; position: absolute;
    top: 10px; right: 10px;
    width: 8px; height: 8px;
    background: var(--sun);
    border-radius: 50%;
    border: 2px solid var(--lavender-2);
  }

  /* Back button */
  .back-btn {
    width: 40px; height: 40px;
    background: var(--lavender-2);
    border-radius: 50%;
    border: 0;
    display: grid; place-items: center;
    font-size: 18px;
    color: var(--ink);
    cursor: pointer;
  }

  /* Detail screen */
  .detail-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .detail-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-top: 12px;
  }
  .detail-time {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  .detail-card {
    background: var(--mint);
    border-radius: 24px;
    padding: 22px;
    margin-top: 18px;
  }
  .detail-card .label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-muted);
  }
  .detail-card .note {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 18px;
    margin-top: 6px;
    color: var(--ink);
  }
  .detail-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .big-btn {
    flex: 1;
    padding: 16px;
    border-radius: 20px;
    border: 0;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  .big-btn:active { transform: scale(0.97); }
  .big-btn.primary { background: var(--ink); color: var(--white); }
  .big-btn.secondary { background: var(--white); color: var(--ink); border: 1.5px solid var(--ink); }

  /* Add screen */
  .add-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-top: 18px;
  }
  .add-title i { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; color: var(--ink-soft); }
  .add-input {
    margin-top: 20px;
    background: var(--lavender);
    border: 2px solid var(--lavender-3);
    border-radius: 22px;
    padding: 22px;
    min-height: 140px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
    resize: none;
    width: 100%;
    outline: none;
    transition: border 0.3s ease;
  }
  .add-input:focus { border-color: var(--ink); }
  .add-input::placeholder { color: var(--ink-muted); }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .chip {
    background: var(--white);
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chip:hover, .chip.active { background: var(--ink); color: var(--white); }

  .save-btn {
    margin-top: 22px;
    width: 100%;
    background: var(--ink);
    color: var(--white);
    border: 0;
    padding: 18px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.2s ease;
  }
  .save-btn:active { transform: scale(0.98); }
  .save-btn .sun { color: var(--sun); }

  /* Together screen */
  .together-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 6px;
  }
  .together-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-top: 14px;
  }
  .together-title i { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; color: var(--ink-soft); }

  .person-card {
    background: var(--white);
    border: 1.5px solid rgba(22,15,34,0.08);
    border-radius: 22px;
    padding: 18px;
    margin-top: 14px;
    display: flex;
    gap: 14px;
    align-items: center;
    box-shadow: 0 10px 30px -20px rgba(22,15,34,0.2);
  }
  .person-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    flex: 0 0 auto;
  }
  .person-avatar.mint { background: var(--mint); }
  .person-avatar.cream { background: var(--cream); }
  .person-avatar.blush { background: var(--blush); }
  .person-body { flex: 1; min-width: 0; }
  .person-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
  }
  .person-status {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #4BA572;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .invite-btn {
    margin-top: 16px;
    width: 100%;
    background: var(--lavender-2);
    border: 2px dashed var(--lavender-line);
    border-radius: 22px;
    padding: 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
  }

  .together-feed {
    margin-top: 22px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .feed-item {
    margin-top: 10px;
    padding: 14px 16px;
    background: var(--lavender);
    border-radius: 18px;
    font-size: 13px;
  }
  .feed-item b {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
  }
  .feed-item .t {
    display: block;
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 3px;
  }

  /* Language pill — quiet EN/ES toggle, used in welcome overlay and profile sheet */
  .lang-pill {
    position: absolute;
    top: 40px; right: 32px;
    display: inline-flex;
    align-items: center;
    padding: 3px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(22,15,34,0.15);
    border-radius: 999px;
    backdrop-filter: blur(8px);
    z-index: 60;
  }
  .lang-pill button {
    border: 0;
    background: transparent;
    color: rgba(22,15,34,0.55);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .lang-pill button.active {
    background: var(--ink);
    color: var(--cream);
    box-shadow: 0 2px 6px rgba(22,15,34,0.2);
  }
  .lang-pill.inline {
    position: static;
    padding: 3px;
  }

  /* Welcome overlay */
  .welcome {
    position: absolute; inset: 0;
    background: var(--lavender-3);
    z-index: 50;
    padding: 60px 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .welcome.hidden {
    opacity: 0;
    transform: translateY(-20px);
    pointer-events: none;
  }
  .welcome h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 0.95;
    letter-spacing: -0.04em;
    margin: 0;
  }
  .welcome h1 i {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    display: block;
    color: var(--ink-soft);
  }
  .welcome p {
    font-size: 16px;
    color: var(--ink-soft);
    margin-top: 14px;
    line-height: 1.5;
    max-width: 300px;
  }
  .welcome .logo {
    width: 72px; height: 72px;
    background: url('butler-mark-512.png') center/cover no-repeat;
    border-radius: 50%;
    font-size: 0;
    color: transparent;
    margin-bottom: 28px;
  }
  .welcome .start {
    background: var(--ink);
    color: var(--white);
    border: 0;
    padding: 20px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .welcome .w-sparkle {
    position: absolute; top: 80px; right: 60px;
    color: var(--ink);
    font-size: 28px;
    animation: twinkle 2.4s ease-in-out infinite;
  }
  .welcome .w-sparkle.two { top: auto; right: auto; bottom: 200px; left: 50px; font-size: 20px; animation-delay: 1s; }

  @keyframes twinkle {
    0%, 100% { transform: rotate(0deg) scale(1); opacity: 0.7; }
    50% { transform: rotate(12deg) scale(1.2); opacity: 1; }
  }

  /* Scribble underline */
  .scribble {
    display: inline;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 12'><path d='M2,8 Q50,2 100,6 T198,5' stroke='%23F5C842' stroke-width='4' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 100% 0.4em;
  }

  /* Help hint */
  .hint {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-muted);
    z-index: 10;
    pointer-events: none;
    text-align: center;
    background: rgba(255,255,255,0.6);
    padding: 8px 16px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
  }

  /* Bottom sheet modal */
  .sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(22,15,34,0.5);
    backdrop-filter: blur(4px);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .sheet-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--white);
    border-radius: 32px 32px 0 0;
    padding: 28px 24px 30px;
    z-index: 41;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(.22,1,.36,1);
    max-height: 82%;
    overflow-y: auto;
    box-shadow: 0 -30px 60px -30px rgba(22,15,34,0.4);
    scrollbar-width: none;
  }
  .sheet::-webkit-scrollbar { display: none; }
  .sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 44px; height: 5px;
    background: var(--lavender-3);
    border-radius: 999px;
    margin: 0 auto 18px;
  }
  .sheet h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.02em;
    margin: 0;

  .sheet h2 i { font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic; color: var(--ink-soft); }
  .sheet p {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.5;
    margin: 8px 0 0;
  }
  .sheet-input {
    width: 100%;
    background: var(--lavender);
    border: 2px solid var(--lavender-3);
    border-radius: 16px;
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    margin-top: 14px;
  }
  .sheet-input:focus { border-color: var(--ink); }
  .sheet-btn {
    width: 100%;
    background: var(--ink);
    color: var(--white);
    border: 0;
    padding: 16px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-top: 14px;
  }
  .sheet-btn.secondary {

    color: var(--ink);
    border: 1px solid var(--lavender-3);

  .sheet-btn:active { transform: scale(0.98); }
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid rgba(22,15,34,0.08);
  }
  .toggle-row:last-child { border-bottom: 0; }

    font-weight: 600;
    font-size: 14px;
  }

    padding: 0;
    backdrop-filter: none;

    left: auto;
    bottom: auto;
    z-index: auto;
    pointer-events: auto;

  .switch {
    width: 44px; height: 26px;
    background: var(--lavender-3);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
    flex: 0 0 auto;

  .switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: var(--white);

  /* Week view */
  .week-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(22,15,34,0.08);
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: var(--ink);

    transition: transform 0.2s ease, background 0.2s ease;
  }
  .week-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.9); }
  .week-btn svg { width: 16px; height: 16px; }

  .week-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  .week-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-top: 4px;
    line-height: 1.1;
  }
  .week-title i {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--lavender-5);
  }
  .week-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 6px;
    line-height: 1.5;
  }
  .week-days {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 22px;
  }
  .week-day {
    background: rgba(255,255,255,0.6);
    border-radius: 18px;
    padding: 14px 16px;
    border: 1px solid rgba(22,15,34,0.06);
  }
  .week-day.today {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }
  .week-day.today .wd-date,
  .week-day.today .wd-name { color: var(--cream); }
  .week-day.today .wd-empty { color: rgba(245,233,200,0.55); }
  .week-day.empty { opacity: 0.65; }
  .wd-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .wd-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
  }
  .wd-date {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-muted);
  }
  .wd-items { display: flex; flex-direction: column; gap: 6px; }
  .wd-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.7);
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .wd-item:hover { transform: translateX(2px); }
  .week-day.today .wd-item { background: rgba(255,255,255,0.12); }
  .wd-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex: 0 0 auto;
  }
  .wd-dot.mint  { background: #8ac7a3; }
  .wd-dot.cream { background: #e8c776; }
  .wd-dot.blush { background: #e89a9a; }
  .wd-dot.lav   { background: #b99fd4; }
  .wd-time {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-muted);
    min-width: 54px;
  }
  .week-day.today .wd-time { color: rgba(245,233,200,0.7); }
  .wd-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    flex: 1;
    color: inherit;
  }
  .wd-empty {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-muted);
    padding: 2px 4px;
  }

  /* Things to tell (at appointments) */
  .tell-card {
    margin-top: 22px;
    padding: 16px;
    background: rgba(255,255,255,0.55);
    border-radius: 18px;
    border: 1px dashed rgba(22,15,34,0.18);
  }
  .tell-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .tell-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--ink);
    margin-top: 4px;
    line-height: 1.25;
  }
  .tell-title i {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--lavender-5);
  }
  .tell-desc {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 6px;
    line-height: 1.5;
  }
  .tell-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .tell-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.8);
    border-radius: 12px;
  }
  .tell-row .bullet {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--lavender-5);
    margin-top: 7px;
    flex: 0 0 auto;
  }
  .tell-row .body { flex: 1; }
  .tell-row .txt {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.4;
  }
  .tell-row .meta {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 2px;
  }
  .tell-add {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .tell-add input {
    flex: 1;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(22,15,34,0.1);
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }
  .tell-add input:focus { border-color: var(--lavender-5); }
  .tell-add button {
    background: var(--ink);
    color: var(--cream);
    border: 0;
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }
  .tell-draft-btn {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: var(--cream);
    border: 1px solid rgba(22,15,34,0.1);
    border-radius: 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
  }
  .tell-draft-btn:hover { background: #f0dfa8; }

  /* Group work */
  .group-sub {
    font-size: 12px;
    color: var(--ink-muted);
    margin: 4px 0 10px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
  }
  .group-card {
    background: var(--white);
    border: 1.5px solid rgba(22,15,34,0.08);
    border-radius: 24px;
    padding: 18px;
    margin-top: 12px;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(.22,1,.36,1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px -20px rgba(22,15,34,0.2);
  }
  .group-card:active { transform: scale(0.985); }
  .group-card.dark { background: var(--ink); color: var(--cream); border-color: transparent; }
  .group-card.dark .g-title { color: var(--cream); }
  .group-card.dark .g-title i { color: rgba(245,233,200,0.7); }
  .group-card.dark .g-eye, .group-card.dark .g-meta { color: rgba(245,233,200,0.6); }
  .group-card.dark .g-meta b { color: var(--cream); }
  .group-card.dark .g-progress-wrap { background: rgba(245,233,200,0.15); }
  .group-card.dark .g-progress { background: var(--sun); }
  .group-card .g-eye {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .group-card .g-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 19px;
    line-height: 1.15;
    margin-top: 4px;
    color: var(--ink);
  }
  .group-card .g-title i {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-soft);
  }
  .group-card .g-members {
    display: flex;
    align-items: center;
    margin-top: 14px;
  }
  .g-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--white);
    display: grid; place-items: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--ink);
    margin-left: -8px;
  }
  .g-dot:first-child { margin-left: 0; }
  .g-dot.mint { background: var(--mint); }
  .g-dot.cream { background: var(--cream); }
  .g-dot.blush { background: var(--blush); }
  .g-dot.lav { background: var(--lavender-2); }
  .group-card.dark .g-dot { border-color: var(--ink); }
  .g-progress-wrap {
    margin-top: 14px;
    height: 8px;
    background: var(--lavender);
    border-radius: 999px;
    overflow: hidden;
  }
  .g-progress {
    height: 100%;
    background: var(--ink);
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.22,1,.36,1);
  }
  .g-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--ink-muted);
  }
  .g-meta b {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: var(--ink);
  }
  .g-badge {
    background: var(--sun);
    color: var(--ink);
    padding: 4px 10px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.04em;
  }

  /* Group sheet task row */
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(22,15,34,0.08);
    cursor: pointer;
  }
  .task-row:last-child { border-bottom: 0; }
  .task-check {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid var(--ink);
    display: grid; place-items: center;
    font-size: 14px;
    color: transparent;
    transition: all 0.2s ease;
    flex: 0 0 auto;
  }
  .task-check.done {
    background: var(--ink);
    color: var(--sun);
  }
  .task-row.done .task-body { opacity: 0.5; }
  .task-row.done .task-title { text-decoration: line-through; }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
  }
  .task-who {
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  /* Time picker */
  .time-picker {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .time-picker select,
  .time-picker input {
    flex: 1;
    background: var(--lavender);
    border: 2px solid var(--lavender-3);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .time-picker select:focus,
  .time-picker input:focus { border-color: var(--ink); }
  .days-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .day-chip {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
    display: grid; place-items: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    background: var(--white);
    color: var(--ink);
    transition: all 0.2s ease;
  }
  .day-chip.active {
    background: var(--ink);
    color: var(--white);
  }

  .notif-item {
    display: flex;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(22,15,34,0.08);
  }
  .notif-item:last-child { border-bottom: 0; }
  .notif-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 6px;
    flex: 0 0 auto;
  }
  .notif-body .t {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
  }
  .notif-body .s {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .toast {
    position: absolute;
    top: 60px; left: 50%;
    transform: translate(-50%, -20px);
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12px;
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 20px 40px -20px rgba(22,15,34,0.5);
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  .toast .sun { color: var(--sun); margin-left: 6px; }

  @media (max-width: 500px) {
    body { padding: 0; align-items: stretch; }
    .phone {
      width: 100vw;
      max-width: 100vw;
      height: 100svh;
      max-height: 100svh;
      border-radius: 0;
      border: 0;
    }
    .stage-label { display: none; }
    .hint { display: none; }
    .bg-squiggle { display: none; }
  }
</style>
</head>

<!-- desktop bg squiggles -->
<svg class="bg-squiggle one" width="300" height="80" viewBox="0 0 300 80" fill="none">

</svg>
<svg class="bg-squiggle two" width="280" height="80" viewBox="0 0 280 80" fill="none">

</svg>
<svg class="bg-squiggle three" width="240" height="70" viewBox="0 0 240 70" fill="none">
  <path d="M2,30 Q60,60 120,20 T238,30" stroke="#9A86B8" stroke-width="3" stroke-linecap="round"/>
</svg>

<div class="stage">
  <div class="stage-label"><b>Butler</b> &nbsp;·&nbsp; clickable preview</div>

  <div class="phone" id="phone">
    <div class="notch"></div>

    <!-- Welcome overlay -->
    <div class="welcome" id="welcome">
      <div class="w-sparkle">✦</div>
      <div class="w-sparkle two">✦</div>
      <!-- Tiny language pill — the "signup" moment. One tap flips the whole app. -->
      <div class="lang-pill" id="welcomeLangPill" role="group" aria-label="Language" translate="no">
        <button type="button" data-lang="en" translate="no" onclick="setLocale('en')">EN</button>
        <button type="button" data-lang="es" translate="no" onclick="setLocale('es')">ES</button>
      </div>
      <div>
        <div class="logo" aria-label="Butler"></div>
        <h1 data-i18n-html="welcome.h1"></h1>
        <p data-i18n="welcome.tagline"></p>
      </div>
      <button class="start" onclick="dismissWelcome()">
        <span data-i18n="welcome.begin"></span> <span style="color:var(--sun)">✦</span>
      </button>
    </div>

    <div class="statusbar">
      <span>9:41</span>
      <span class="icons">●●● ●</span>
    </div>

    <div class="screens" id="screens">

      <!-- HOME -->
      <div class="screen active" data-screen="home">
        <div class="head-row">
          <div class="avatar" onclick="openSheet('profile')" role="button" aria-label="profile"></div>
          <div style="display:flex;gap:10px;align-items:center">
            <button class="week-btn" onclick="go('week')" aria-label="week ahead">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
              <span data-i18n="nav.week"></span>
            </button>
            <div class="bell" onclick="openSheet('notifications')" role="button">🔔</div>
          </div>
        </div>
        <div style="margin-top:18px">
          <div class="greeting-eyebrow" data-i18n="home.date"></div>
          <div class="greeting-title" id="greetingTitle"></div>
          <div class="greeting-sub" data-i18n="home.sub"></div>
        </div>

        <div class="reminders" id="remindersList"></div>

        <div class="hero-card" onclick="openSheet('pharmacy')">
          <div class="sparkle">✦</div>
          <div class="h-eye" data-i18n="home.pharmacy_eye"></div>
          <h3 data-i18n-html="home.pharmacy_h3"></h3>
        </div>

        <div style="height:30px"></div>
      </div>

      <!-- WEEK -->
      <div class="screen" data-screen="week">
        <button class="back-btn" onclick="go('home')">←</button>
        <div class="week-eyebrow" data-i18n="week.eyebrow"></div>
        <div class="week-title" data-i18n-html="week.title"></div>
        <div class="week-sub" data-i18n="week.sub"></div>
        <div class="week-days" id="weekDays"></div>
        <div style="height:30px"></div>
      </div>

      <!-- DETAIL -->
      <div class="screen" data-screen="detail">
        <button class="back-btn" onclick="go('home')">←</button>
        <div class="detail-top"></div>
        <div class="greeting-eyebrow" id="detail-eyebrow">At 10:00 AM</div>
        <div class="detail-title" id="detail-title">Morning pills</div>
        <div class="detail-time" id="detail-time">in about 12 minutes</div>

        <div class="detail-card" id="detail-card">
          <div class="label" data-i18n="detail.holding"></div>
          <div class="note" id="detail-note">&ldquo;The blue ones, with a full glass of water.&rdquo;</div>
        </div>

        <div style="margin-top:18px">
          <div class="label" style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted)" data-i18n="detail.reaches_by"></div>
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

            <div class="chip" data-i18n="detail.email"></div>
          </div>

        <div class="detail-row">
          <button class="big-btn primary" onclick="markDone()" data-i18n="detail.mark_done"></button>

let locale = DEFAULT_LOCALE;

function detectLocale() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored && LOCALES.includes(stored)) return stored;
  } catch (e) { /* localStorage may be unavailable */ }
  const nav = (navigator.languages && navigator.languages[0]) || navigator.language || '';
  if (nav.toLowerCase().startsWith('es')) return 'es';
  return DEFAULT_LOCALE;
}

function t(key, vars) {
  const dict = I18N[locale] || I18N[DEFAULT_LOCALE];
  let val = dict[key];
  if (val === undefined) val = I18N[DEFAULT_LOCALE][key];
  if (val === undefined) return key;
  if (typeof val === 'string' && vars) {
    val = val.replace(/\{(\w+)\}/g, (_, k) => (vars[k] !== undefined ? vars[k] : '{' + k + '}'));
  }
  return val;
}

function applyStaticI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.getAttribute('data-i18n-html'));
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.setAttribute('placeholder', t(el.getAttribute('data-i18n-placeholder')));
  });
  // Language pill active state (welcome overlay + any inline copy)
  document.querySelectorAll('.lang-pill').forEach(pill => {
    pill.querySelectorAll('button[data-lang]').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === locale);
    });
  });
  document.documentElement.lang = locale;
}

function setLocale(loc) {
  if (!LOCALES.includes(loc)) return;
  locale = loc;
  try { localStorage.setItem(STORAGE_KEY, loc); } catch (e) {}
  state = buildState(loc);
  applyStaticI18n();
  renderAll();
  updateGreetingCount();
  updateSharedLine();
  // If a sheet is open, re-render its content with the new locale
  const sheet = document.getElementById('sheet');
  if (sheet && sheet.classList.contains('open')) {
    const content = document.getElementById('sheetContent');
    if (content && currentSheet) {
      content.innerHTML = sheetContent(currentSheet.kind, currentSheet.arg);
    }
  }
  // If detail screen is showing, refresh its dynamic bits
  if (state.currentDetail) {
    const r = state.reminders.find(x => x.id === state.currentDetail);
    if (r) {
      document.getElementById('detail-eyebrow').textContent = r.when;
      document.getElementById('detail-title').textContent = r.title;
      document.getElementById('detail-time').textContent = r.done ? t('detail.done_handled') : r.relative;
      document.getElementById('detail-note').innerHTML = r.note;
      if (r.type === 'appointment' && r.providerName) {
        document.getElementById('tellTitle').innerHTML = t('detail.tell_title', { provider: r.providerName });
        renderTellList(r);
      }
    }
  }
}

/* Currently-open sheet, so we can re-render it on language change */
let currentSheet = null;

/* ---------- Render ---------- */
function renderReminders() {
  const list = document.getElementById('remindersList');
  list.innerHTML = '';
  state.reminders.filter(r => (r.dayOffset || 0) === 0).forEach(r => {
    const el = document.createElement('div');
    el.className = 'reminder ' + r.color + (r.done ? ' done' : '');
    el.onclick = () => openDetail(r.id);
    el.innerHTML = `
      <div class="time-chip">${r.time}<br/><small>${r.ampm}</small></div>
      <div class="r-body">
        <div class="r-title">${r.title}</div>
        <div class="r-sub">${r.sub}</div>
      </div>
      <div class="r-arrow">→</div>
    `;
    list.appendChild(el);
  });
  updateGreetingCount();
}

function updateGreetingCount() {
  const greeting = document.getElementById('greetingTitle');
  if (!greeting) return;
  const remaining = state.reminders.filter(r => (r.dayOffset || 0) === 0 && !r.done).length;
  let countKey;
  if      (remaining === 0) countKey = 'home.count.zero';
  else if (remaining === 1) countKey = 'home.count.one';
  else if (remaining === 2) countKey = 'home.count.two';
  else if (remaining === 3) countKey = 'home.count.three';
  else                      countKey = 'home.count.many';
  const phrase = t(countKey, { n: remaining });
  greeting.innerHTML = `${t('home.greet_name')} <i>${phrase}</i>`;
}

function updateSharedLine() {
  const el = document.getElementById('detailSharedLine');
  if (!el) return;
  el.innerHTML = t('detail.shared_line', {
    name: 'Maria',
    relation: t('detail.relation_daughter'),
  });
}

function renderPeople() {
  const list = document.getElementById('peopleList');
  if (!list) return;
  list.innerHTML = '';
  state.people.forEach(p => {
    const el = document.createElement('div');
    el.className = 'person-card';
    el.style.cursor = 'pointer';
    el.onclick = () => openSheet('person', p.id);
    const seesKey = p.seeing === 1 ? 'together.person_sees_one' : 'together.person_sees_many';
    const sees = t(seesKey, { relation: p.relation, n: p.seeing });
    el.innerHTML = `
      <div class="person-avatar ${p.color}">${p.initial}</div>
      <div class="person-body">
        <div class="person-name">${p.name}</div>
        <div class="person-status"><span class="status-dot"></span>${sees}</div>
      </div>
      <div class="r-arrow" style="background:var(--lavender-2);color:var(--ink)">→</div>
    `;
    list.appendChild(el);
  });
}

function renderFeed() {
  const list = document.getElementById('feedList');
  if (!list) return;
  list.innerHTML = '';
  state.feed.forEach(f => {
    const el = document.createElement('div');
    el.className = 'feed-item';
    el.style.cursor = 'pointer';
    el.onclick = () => toast(t('toast.full_story'));
    el.innerHTML = `<b>${f.who}</b> ${f.text}<span class="t">${f.t}</span>`;
    list.appendChild(el);
  });
}

function renderGroups() {
  const list = document.getElementById('groupList');
  if (!list) return;
  list.innerHTML = '';
  state.groups.forEach(g => {
    const done = g.tasks.filter(tk => tk.done).length;
    const total = g.tasks.length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    const el = document.createElement('div');
    el.className = 'group-card' + (g.dark ? ' dark' : '');
    el.onclick = () => openSheet('group', g.id);
    el.innerHTML = `
      <div class="g-head">
        <div>
          <div class="g-eye">${g.eyebrow}</div>
          <div class="g-title">${g.title} <i>${g.titleI}</i></div>
        </div>
        ${pct === 100 ? `<div class="g-badge">${t('group.done_badge')}</div>` : ''}
      </div>
      <div class="g-members">
        ${g.members.map(m => `<div class="g-dot ${m.c}">${m.i}</div>`).join('')}
      </div>
      <div class="g-progress-wrap"><div class="g-progress" style="width:${pct}%"></div></div>
      <div class="g-meta">
        <span>${t('group.of_done', { done, total })}</span>
        <span>${g.memberNames}</span>
      </div>
    `;
    list.appendChild(el);
  });
}

function renderAll() {
  renderReminders();
  renderPeople();
  renderFeed();
  renderGroups();
  renderWeek();
  updateSharedLine();
}

function renderWeek() {
  const container = document.getElementById('weekDays');
  if (!container) return;
  container.innerHTML = '';
  const dayNames = t('week.days');
  const dayDates = t('week.dates');
  for (let i = 0; i < 7; i++) {
    const items = state.reminders.filter(r => (r.dayOffset || 0) === i);
    const day = document.createElement('div');
    day.className = 'week-day' + (i === 0 ? ' today' : '') + (items.length === 0 ? ' empty' : '');
    let itemsHtml = '';
    if (items.length === 0) {
      itemsHtml = `<div class="wd-empty">${t('week.quiet')}</div>`;
    } else {
      itemsHtml = `<div class="wd-items">` + items.map(r => `
        <div class="wd-item" onclick="openDetail('${r.id}')">
          <div class="wd-dot ${r.color}"></div>
          <div class="wd-time">${r.time} ${r.ampm}</div>
          <div class="wd-title">${r.title}</div>
        </div>
      `).join('') + `</div>`;
    }
    day.innerHTML = `
      <div class="wd-head">
        <div class="wd-name">${dayNames[i]}</div>
        <div class="wd-date">${dayDates[i]}</div>
      </div>
      ${itemsHtml}
    `;
    container.appendChild(day);
  }
}

/* ---------- Screen nav ---------- */
const tabs = document.querySelectorAll('.tab');
let navLock = false;
function go(name) {
  if (navLock) return;
  const current = document.querySelector('.screen.active');
  if (current && current.dataset.screen === name) return;
  const next = document.querySelector(`.screen[data-screen="${name}"]`);
  if (!next) return;

  navLock = true;
  next.scrollTop = 0;

  if (current) current.classList.remove('active');
  next.classList.add('active');

  setTimeout(() => { navLock = false; }, 240);

  const tabName = ['home','add','together'].includes(name) ? name : 'home';
  tabs.forEach(tb => tb.classList.toggle('active', tb.dataset.tab === tabName));
}

/* ---------- Detail ---------- */
function openDetail(id) {
  const r = state.reminders.find(x => x.id === id);
  if (!r) return;
  state.currentDetail = id;
  document.getElementById('detail-eyebrow').textContent = r.when;
  document.getElementById('detail-title').textContent = r.title;
  document.getElementById('detail-time').textContent = r.done ? t('detail.done_handled') : r.relative;
  document.getElementById('detail-note').innerHTML = r.note;
  document.getElementById('detail-card').style.background =
    r.color === 'mint'  ? 'var(--mint)'  :
    r.color === 'cream' ? 'var(--cream)' :
    r.color === 'blush' ? 'var(--blush)' : 'var(--lavender-2)';

  const tellCard = document.getElementById('tellCard');
  if (r.type === 'appointment' && r.providerName) {
    if (!r.thingsToTell) r.thingsToTell = [];
    tellCard.style.display = 'block';
    document.getElementById('tellTitle').innerHTML = t('detail.tell_title', { provider: r.providerName });
    document.getElementById('tellDesc').textContent = t('detail.tell_desc');
    renderTellList(r);
  } else {
    tellCard.style.display = 'none';
  }

  go('detail');
}

function renderTellList(r) {
  const list = document.getElementById('tellList');
  list.innerHTML = '';
  if (!r.thingsToTell || r.thingsToTell.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'tell-row';
    empty.innerHTML = `<div class="body"><div class="txt" style="font-family:'Instrument Serif',serif;font-style:italic;color:var(--ink-muted)">${t('detail.tell_empty')}</div></div>`;
    list.appendChild(empty);
    return;
  }
  r.thingsToTell.forEach(item => {
    const row = document.createElement('div');
    row.className = 'tell-row';
    row.innerHTML = `<div class="bullet"></div><div class="body"><div class="txt">${item.text}</div><div class="meta">${t('detail.tell_added', { ago: item.added })}</div></div>`;
    list.appendChild(row);
  });
}

function addTellItem() {
  const r = state.reminders.find(x => x.id === state.currentDetail);
  if (!r) return;
  const input = document.getElementById('tellInput');
  const text = (input.value || '').trim();
  if (!text) return;
  if (!r.thingsToTell) r.thingsToTell = [];
  r.thingsToTell.push({ id: 't' + Date.now(), text, added: t('detail.tell_just_now') });
  input.value = '';
  renderTellList(r);
  toast(t('toast.tell_remember'));
}

function draftTellMessage() {
  const r = state.reminders.find(x => x.id === state.currentDetail);
  if (!r) return;
  const portal = r.portal || t('toast.draft_default_portal');
  toast(t('toast.draft_ready', { portal }));
}

function markDone() {
  const id = state.currentDetail;
  if (!id) return;
  const r = state.reminders.find(x => x.id === id);
  if (r) r.done = true;
  toast(t('toast.butler_got_it'));
  renderAll();
  setTimeout(() => go('home'), 650);
}

function snoozeReminder() {
  const id = state.currentDetail;
  if (!id) return;
  const r = state.reminders.find(x => x.id === id);
  if (!r) return;
  let [h, m] = r.time.split(':').map(Number);
  m += 10;
  if (m >= 60) { m -= 60; h += 1; }
  r.time = `${h}:${m.toString().padStart(2,'0')}`;
  r.relative = t('toast.snoozed_rel');
  toast(t('toast.snoozed'));
  renderAll();
  setTimeout(() => go('home'), 650);
}

/* ---------- Add ---------- */
function toggleChip(el) {
  const parent = el.parentElement;
  const groupLabel = parent.previousElementSibling;
  // Detect the "When?" row by checking the label's i18n key (locale-agnostic)
  const isWhen = groupLabel && groupLabel.getAttribute && groupLabel.getAttribute('data-i18n') === 'add.when_label';
  if (isWhen) {
    parent.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    state.customWhen = null;
    const customChip = document.getElementById('customWhenChip');
    if (customChip) customChip.textContent = t('add.custom');
  }
  el.classList.toggle('active');
}

function saveReminder() {
  const textarea = document.querySelector('#add-screen-input') || document.querySelector('[data-screen="add"] .add-input');
  const text = (textarea && textarea.value || '').trim();
  if (!text) {
    toast(t('toast.need_text'));
    if (textarea) textarea.focus();
    return;
  }
  const colors = ['lav','mint','cream','blush'];
  const nextColor = colors[state.reminders.length % colors.length];
  const catChips = document.querySelectorAll('[data-screen="add"] .chips:first-of-type .chip.active');
  const catSub = catChips.length ? Array.from(catChips).map(c => c.textContent).join(' · ') : '';

  let time, ampm, whenLabel, relative, scheduleSub;
  if (state.customWhen) {
    const cw = state.customWhen;
    time = `${cw.hour}:${cw.minute}`;
    ampm = cw.ampm;
    const daysSummary =
      cw.days.length === 0 ? t('cw.once') :
      cw.days.length === 7 ? t('cw.every_day') :
      cw.days.length === 5 && ['mon','tue','wed','thu','fri'].every(d => cw.days.includes(d)) ? t('cw.weekdays') :
      cw.days.length === 2 && cw.days.includes('sat') && cw.days.includes('sun') ? t('cw.weekends') :
      cw.days.join(', ');
    whenLabel = t('add.whenlabel_at_days', { time, ampm, days: daysSummary });
    relative = t('add.relative_custom');
    scheduleSub = daysSummary;
  } else {
    const now = new Date();
    const hh = ((now.getHours() + 1) % 24);
    time = (hh % 12 === 0 ? 12 : hh % 12) + ':00';
    ampm = hh >= 12 ? 'PM' : 'AM';
    whenLabel = t('add.whenlabel_at', { time, ampm });
    relative = t('add.relative_hour');
    scheduleSub = '';
  }

  const sub = [catSub, scheduleSub].filter(Boolean).join(' · ') || t('add.default_sub');

  const id = 'r' + Date.now();
  state.reminders.push({
    id, time, ampm,
    title: text.length > 32 ? text.slice(0,30) + '…' : text,
    sub, color: nextColor,
    when: whenLabel, relative,
    note: '&ldquo;' + text + '&rdquo;', sharedWith: [], done: false
  });
  if (textarea) textarea.value = '';
  state.customWhen = null;
  const customChip = document.getElementById('customWhenChip');
  if (customChip) customChip.textContent = t('add.custom');
  renderAll();
  toast(t('toast.got_it'));
  setTimeout(() => go('home'), 700);
}

/* ---------- Welcome ---------- */
function dismissWelcome() {
  document.getElementById('welcome').classList.add('hidden');
}

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg) {
  const tEl = document.getElementById('toast');
  tEl.innerHTML = msg;
  tEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => tEl.classList.remove('show'), 2200);
}

/* ---------- Bottom sheets ---------- */
// Pending toggle map for the currently open group sheet. Checkbox taps update
// this staging area — they are NOT committed to state.groups until the user
// taps "Add it". Tapping "Done" closes without committing. This matches the
// user's mental model: nothing saves until they confirm.
let pendingGroupToggles = {};

function openSheet(kind, arg) {
  currentSheet = { kind, arg };
  pendingGroupToggles = {}; // reset staging on every sheet open
  const sheet = document.getElementById('sheet');
  const backdrop = document.getElementById('sheetBackdrop');
  const content = document.getElementById('sheetContent');
  content.innerHTML = sheetContent(kind, arg);
  backdrop.classList.add('open');
  sheet.classList.add('open');
}
function closeSheet() {
  currentSheet = null;
  pendingGroupToggles = {}; // discard any un-committed toggles
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('open');
}

function toggleShare(personId, key, el) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  p.share[key] = !p.share[key];
  el.classList.toggle('on');
  p.seeing = Object.values(p.share).filter(Boolean).length;
  renderPeople();
  const shareKeyLabel = t('share.' + key);
  const msg = p.share[key]
    ? t('person.now_sees',       { name: p.name, key: shareKeyLabel })
    : t('person.no_longer_sees', { name: p.name, key: shareKeyLabel });
  toast(msg);
}

function removePerson(personId) {
  const idx = state.people.findIndex(x => x.id === personId);
  if (idx < 0) return;
  const name = state.people[idx].name;
  state.people.splice(idx, 1);
  renderPeople();
  toast(t('person.paused', { name }));
  closeSheet();
}

function toggleTask(groupId, taskId) {
  const g = state.groups.find(x => x.id === groupId);
  if (!g) return;
  const tk = g.tasks.find(x => x.id === taskId);
  if (!tk) return;
  // Stage the toggle — don't commit to state.groups yet. "Add it" commits,
  // "Done" discards. This way tapping Done never accidentally saves a check.
  const current = (tk.id in pendingGroupToggles) ? pendingGroupToggles[tk.id] : tk.done;
  const next = !current;
  if (next === tk.done) {
    // toggled back to the original — clear the staged change
    delete pendingGroupToggles[tk.id];
  } else {
    pendingGroupToggles[tk.id] = next;
  }
  // Re-render only the sheet; leave the underlying group card alone until commit.
  const content = document.getElementById('sheetContent');
  if (content) content.innerHTML = sheetContent('group', groupId);
}

function addGroupTask(groupId) {
  const input = document.getElementById('newTaskInput');
  const val = (input && input.value || '').trim();
  const g = state.groups.find(x => x.id === groupId);
  if (!g) return;

  // Commit any staged checkbox toggles.
  const pendingKeys = Object.keys(pendingGroupToggles);
  let toggledCount = 0;
  let lastToggledDoneTitle = null;
  pendingKeys.forEach(tid => {
    const tk = g.tasks.find(x => x.id === tid);
    if (!tk) return;
    if (tk.done !== pendingGroupToggles[tid]) {
      tk.done = pendingGroupToggles[tid];
      toggledCount++;
      if (tk.done) lastToggledDoneTitle = tk.title;
    }
  });
  pendingGroupToggles = {};

  // Add the new task if the user typed one.
  if (val) {
    g.tasks.push({ id: 'g' + Date.now(), title: val, who: locale === 'es' ? 'Tú' : 'You', done: false });
  }

  renderGroups();

  // Nothing happened at all → just close the sheet, no toast.
  if (!val && toggledCount === 0) { closeSheet(); return; }

  // If the user added a new task, keep the sheet open so they can add more.
  // If they only committed toggles, close the sheet — the action is complete.
  if (val) {
    document.getElementById('sheetContent').innerHTML = sheetContent('group', groupId);
    toast(t('group.added_list'));
  } else {
    if (lastToggledDoneTitle) {
      toast(t('group.task_done', { title: lastToggledDoneTitle }));
    }
    closeSheet();
  }
}

function createGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  const when = document.getElementById('newGroupWhen').value.trim();
  const withWhom = document.getElementById('newGroupWith').value.trim();
  if (!name) { toast(t('newGroup.need_name')); return; }
  const names = withWhom ? withWhom.split(',').map(s => s.trim()).filter(Boolean) : [];
  const colors = ['mint','cream','blush','lav'];
  const members = [{ i: 'T', c: 'mint' }, ...names.map((n, i) => ({ i: n[0].toUpperCase(), c: colors[(i+1) % colors.length] }))];
  state.groups.unshift({
    id: 'g' + Date.now(),
    eyebrow: when || t('newGroup.soon'),
    title: name,
    titleI: '',
    members,
    memberNames: names.length ? t('newGroup.you_with', { names: names.join(', ') }) : t('newGroup.you_alone'),
    dark: false,
    tasks: [],
  });
  state.feed.unshift({
    who: locale === 'es' ? 'Tú' : 'You',
    text: t('newGroup.feed_text', { name }),
    t: locale === 'es' ? 'ahora mismo' : 'just now',
  });
  renderAll();
  toast(t('newGroup.started'));
  closeSheet();
}

function saveCustomWhen() {
  const hour = document.getElementById('cwHour').value;
  const minute = document.getElementById('cwMinute').value;
  const ampm = document.getElementById('cwAmPm').value;
  const label = document.getElementById('cwLabel').value.trim();
  const days = Array.from(document.querySelectorAll('.day-chip.active')).map(el => el.dataset.day);
  state.customWhen = { hour, minute, ampm, days, label };

  const customChip = document.getElementById('customWhenChip');
  if (customChip) {
    const parent = customChip.parentElement;
    parent.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    customChip.classList.add('active');
    const daysSummary =
      days.length === 0 ? t('cw.once') :
      days.length === 7 ? t('cw.every_day_cap') :
      days.length === 5 && ['mon','tue','wed','thu','fri'].every(d => days.includes(d)) ? t('cw.weekdays_cap') :
      t('cw.days_week', { n: days.length });
    customChip.textContent = `${hour}:${minute} ${ampm} · ${daysSummary} ✦`;
  }
  toast(t('cw.saved'));
  closeSheet();
}

function sendInvite() {
  const name = document.getElementById('inviteName').value.trim();
  const rel = document.getElementById('inviteRelation').value.trim();
  if (!name) { toast(t('invite.need_name')); return; }
  const initials = name[0].toUpperCase();
  const colors = ['mint','cream','blush'];
  state.people.push({
    id: 'p' + Date.now(),
    name,
    initial: initials,
    relation: rel || t('invite.default_rel'),
    color: colors[state.people.length % colors.length],
    seeing: 0,
    share: { medication: false, appointments: false, calls: false, location: false }
  });
  state.feed.unshift({
    who: locale === 'es' ? 'Tú' : 'You',
    text: t('invite.feed_text', { name }),
    t: locale === 'es' ? 'ahora mismo' : 'just now',
  });
  renderAll();
  toast(t('invite.sent', { name }));
  closeSheet();
}

    if (sheet.classList.contains('open')) {
      closeSheet();
    } else {
      document.getElementById('welcome').classList.remove('hidden');
    }
  }
});

</script>
</body>
